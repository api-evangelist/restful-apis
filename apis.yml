aid: restful-apis
name: RESTful APIs
description: >-
  Representational State Transfer (REST) is an architectural style for
  designing networked applications. RESTful APIs use HTTP methods to perform
  CRUD operations and communicate between client and server using stateless,
  cacheable requests with standard conventions. This collection covers RESTful
  API design principles, best practices, standards, tools, and the OpenAPI
  Specification ecosystem.
